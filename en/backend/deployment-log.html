<!-- @reason:
  This document is a structured learning log for deployment. It records the study of CI/CD pipelines, hosting platforms, and release management strategies.
-->

<!doctype html>
<!-- @block:
  I declare the document type as HTML5.
  The browser uses this instruction to interpret the page in modern standards mode.
-->

<html lang="en">
  <!-- @block:
    The root element of the document.
    The lang="en" attribute declares that the main language of this page is English.
    This helps accessibility tools, search engines, and automated processing systems.
  -->
  <head>
    <!-- @block:
      The <head> contains the document metadata.
      I do not place the main visible content here; instead, I keep the information
      the browser needs in order to understand, prepare, and connect the page resources.
    -->

    <meta charset="UTF-8" />
    <!-- @meta:
      I set the character encoding to UTF-8.
      This ensures that diacritics, special symbols, and international characters display correctly.
    -->

    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <!-- @warning:
      This instruction is historically related to Internet Explorer compatibility.
      In modern projects it has little practical use, but I keep it here if I want
      to preserve the classic basic-head structure.
    -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- @meta:
      I configure the viewport for responsive display.
      width=device-width aligns the page width with the real screen width,
      and initial-scale=1.0 starts without artificial zoom.
    -->

    <title>D::0dy55ey | Deployment Log</title>
    <!-- @meta:
      The page title.
      I see it in the browser tab, in bookmarks, and sometimes in search engine results.
    -->

    <meta
      name="description"
      content="A structured log documenting deployment strategies — CI/CD pipelines, hosting platforms, environment configuration, and release management."
    />
    <!-- @meta:
      The page description.
      I use it as a short summary of the content; it is not directly visible in the page,
      but search engines may use it as descriptive text.
    -->

    <meta
      name="keywords"
      content="deployment, ci/cd, pipelines, hosting, environment configuration, release management, backend, D::0dy55ey"
    />
    <!-- @meta:
      The keywords meta tag lists the main themes of the page.
      Search engines no longer rank on it, but it stays a useful, self-documenting
      summary of the page's scope and a teaching example of the tag itself.
    -->

    <meta name="author" content="Iulia-Alexandra Cadar" />
    <!-- @meta:
      The author meta tag declares who created and maintains this document.
      It is a standard metadata field that identifies the creator of the work.
    -->

    <link rel="manifest" href="../site.webmanifest" />
    <!-- @path:
      I link the web app manifest. Firefox reads theme_color from the manifest
      rather than from the meta tag, so this ensures consistent theme-color
      support across all modern browsers including Firefox.
    -->


    <meta property="og:title" content="D::0dy55ey | Deployment Log" />
    <!-- @meta:
      Open Graph title.
      When the page link is shared on social networks or portfolio sites,
      this text appears as the card title instead of the raw URL.
    -->

    <meta
      property="og:description"
      content="A structured log documenting deployment strategies — CI/CD pipelines, hosting platforms, environment configuration, and release management."
    />
    <!-- @meta:
      Open Graph description.
      It is the companion summary shown under the Open Graph title on shared cards.
      I keep it aligned with the meta description for consistency.
    -->

    <meta property="og:type" content="website" />
    <!-- @meta:
      Open Graph type.
      I declare this page as a website, the general type for standard HTML pages.
      For journal entries, I could use "article" instead depending on the content nature.
    -->

    <meta property="og:url" content="https://iuliacadar.github.io/digital-odyssey/en/backend/deployment-log.html" />
    <!-- @meta:
      Open Graph canonical URL.
      When the page is shared, this tells platforms the exact, permanent address of this page.
      It prevents confusion if the same content is accessible from multiple URLs.
    -->

    <meta property="og:locale" content="en_US" />
    <!-- @meta:
      Open Graph locale.
      I set it to en_US for the English version of the page.
      This tells social platforms and aggregators the language and regional variant of the content.
    -->

    <meta property="og:site_name" content="D::0dy55ey" />
    <!-- @meta:
      Open Graph site name.
      This is the overarching project name shown on social sharing cards,
      so the audience knows which site the page belongs to.
    -->

    <meta property="og:background_color" content="#0a0b1e" />
    <!-- @theme:
      Open Graph background color.
      Some sharing surfaces use it to tint the preview card with the project's deep-space palette.
    -->

    <meta property="og:image" content="../favicon.svg" />
    <!-- @path:
      Open Graph image.
      It is the preview picture used on shared cards. I point it at the favicon
      in the corresponding language folder as a stable, always-available placeholder,
      until a dedicated capture exists for each page.
    -->

    <meta name="twitter:card" content="summary_large_image" />
    <!-- @meta:
      Twitter card type.
      I choose summary_large_image so that shared links on X/Twitter display
      a large image preview alongside the title and description.
    -->

    <link rel="canonical" href="https://iuliacadar.github.io/digital-odyssey/en/backend/deployment-log.html" />
    <!-- @meta:
      Canonical link.
      I tell search engines that this URL is the authoritative version of the page.
      This helps prevent duplicate-content issues and consolidates ranking signals.
    -->

    <meta name="robots" content="index, follow" />
    <!-- @meta:
      Robots meta tag.
      I allow search engines to index this page and follow its links,
      which is the default and expected behavior for public content.
    -->

    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <!-- @path:
      I link the page favicon.
      The path is relative to the current file location.
      The browser looks for favicon.svg in the appropriate folder.
    -->

    <link rel="apple-touch-icon" href="../favicon.svg" />
    <!-- @path:
      I link the Apple Touch Icon for iOS devices.
      Safari on iPhone and iPad uses this icon when the page is added to the home screen
      or displayed as a web app. I reuse the same favicon.svg as the icon source.
    -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <!-- @reason:
      I start the connection to the font server early.
      The goal is to reduce latency when loading external resources.
    -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- @reason:
      I preconnect to the domain that serves the actual font files.
      crossorigin is required for external resources served from another origin.
    -->

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
    />
    <!-- @reason:
      I load the Space Grotesk font from Google Fonts.
      display=swap tells the browser to use a fallback font temporarily until the final font loads.
    -->

    <link rel="stylesheet" href="../style.css" />
    <!-- @path:
      I link the local stylesheet.
      The path is relative to the current file location.
    -->
  </head>
  <body>
        <nav class="navbar">
      <!-- @block: TERMINAL IDENTITY
        The logo block displays the vessel callsign and the current section name.
        It is static text (not a link) because this page is itself a station
        on the ship; the crew reads their location here.
      -->
      <div class="logo">D::0dy55ey / Deployment Log</div>

      <!-- @block: NAVIGATION COMMANDS
        The nav-links list contains the primary navigation actions.
        On secondary pages, only one command is offered: return to the bridge.
      -->
      <ul class="nav-links">
        <li>
          <a href="../index.html"
            ><!-- @reason:
              The left-arrow symbol (←) acts as a visual back-direction cue.
              "Return to Command Deck" links to index.html, the mothership's
              main bridge.
            -->← Return to Command Deck</a
          >
        </li>
      </ul>
    </nav>

    <main class="main-container">
      <section id="log-deck">
        <header class="category-header">
      <!-- @block:
        This log page will be populated with chapter-specific content during
        the active building phase. Currently it serves as a structural shell
        with the navigation and footer systems in place.
      -->
        </header>
      </section>
    </main>

            <!-- @block:
      I open the footer block here. This is the closing section of every page
      in the project. I place inside it the telemetry data stream: the current
      sector orbit, the spatiotemporal coordinates, a link to the bibliography,
      and the captain's signature.
    -->
    <footer class="footer">
      <!-- @structure:
        I create a container for the external communications link. It houses
        the portal to the bibliography page, styled as a navigational beacon
        that guides the reader to the reference archives.
      -->
      <div class="external-comms">
        <!-- @path:
          I set the href to "bibliography.html", which points to the bibliography
          page. Because this file is in the same folder as the bibliography,
          I use the filename directly. For log pages inside subfolders like
          frontend/, I would write "../bibliography.html" to go up one level.
        -->
        <a
          href="bibliography.html"
          target="_blank"
          class="archive-link"
        >
          <!-- @structure:
            I insert a small circular indicator before the link text.
            The .pulse-dot class styles it as a 6px green dot. A CSS keyframe
            animation (dot-pulse) makes it scale up and fade out repeatedly,
            like an active radar beacon or communication signal light.
          -->
          <span class="pulse-dot"></span>
          <!-- @reason:
            I add target="_blank" to the anchor element. This tells the browser
            to open the bibliography page in a new tab instead of navigating
            away from the current page. The reader can consult the references
            without losing their scroll position or current context.
          -->
          Star Charts — Bibliography
        </a>
      </div>

      <!-- @structure:
        I write the first telemetry data line. It tells the reader which sector
        or chapter they are currently viewing. SYS_ORBIT changes per page:
        index pages say COMMAND_DECK, frontend logs say FRONTEND_EXPEDITION,
        backend pages say BACKEND_EXPEDITION, and so on for each chapter.
      -->
      <p>
        SYS_ORBIT: BACKEND_EXPEDITION
        // STATUS:
        <span class="telemetry-active">ONLINE</span>
        <!-- @theme:
          I wrap the word ONLINE in a <span> with the class .telemetry-active.
          This class applies the solar-mint green color (#a7f3d0) and adds a
          neon text-shadow glow effect. The green phosphor color mimics the
          look of active status indicators on 1970s NASA mission control terminals.
        -->
      </p>

      <!-- @structure:
        I write the second telemetry data line. It anchors the project in real
        physical space and time. The coordinates point to the captain's location,
        and the date marks when this footer was last updated.
      -->
      <p>
        COORDINATES: 46.7712&deg; N, 23.6236&deg; E // SYSTEM_TIME: 2026.07.22
        <!-- @reason:
          I include geographic coordinates and a system timestamp.
          The numbers 46.7712° N, 23.6236° E are the latitude and longitude of
          Cluj-Napoca, Romania — the place where this project is being built.
          SYSTEM_TIME records the date of the latest footer update.
        -->
      </p>

      <!-- @structure:
        I write the final line of the footer. It declares who created and owns
        this project. The copyright symbol followed by the year and the captain's
        name marks the intellectual ownership of the content.
      -->
      <p class="copyright">
        &copy; 2026 | D::0dy55ey by
        <span class="vessel-sig">Iulia-Alexandra Cadar</span>
        <!-- @theme:
          I wrap the captain's name in a <span> with the class .vessel-sig.
          This class applies the nebula-pink color (#ff007f) with an incandescent
          text-shadow glow. The magenta signature acts as the captain's unique
          identifier across all decks of the ship.
        -->
      </p>
    </footer>

    <script src="../script.js"></script>
  </body>
</html>
