<!-- @reason:
  This document is a structured learning log for backend programming languages. It records the study of language syntax, paradigms, and ecosystem patterns.
-->

<!doctype html>
<!-- @block:
  I declare the document type as HTML5.
  The browser uses this instruction to interpret the page in modern standards mode.
-->

<html lang="en">
  <!-- @block:
    The root element of the document.
    The lang="en" attribute declares that the main language of this page is English.
    This helps accessibility tools, search engines, and automated processing systems.
  -->
  <head>
    <!-- @block:
      The <head> contains the document metadata.
      I do not place the main visible content here; instead, I keep the information
      the browser needs in order to understand, prepare, and connect the page resources.
    -->

    <meta charset="UTF-8" />
    <!-- @meta:
      I set the character encoding to UTF-8.
      This ensures that diacritics, special symbols, and international characters display correctly.
    -->

    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <!-- @warning:
      This instruction is historically related to Internet Explorer compatibility.
      In modern projects it has little practical use, but I keep it here if I want
      to preserve the classic basic-head structure.
    -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- @meta:
      I configure the viewport for responsive display.
      width=device-width aligns the page width with the real screen width,
      and initial-scale=1.0 starts without artificial zoom.
    -->

    <title>D::0dy55ey | Backend Languages Log</title>
    <!-- @meta:
      The page title.
      I see it in the browser tab, in bookmarks, and sometimes in search engine results.
    -->

    <meta
      name="description"
      content="A structured log documenting backend programming languages — syntax, paradigms, ecosystems, and language-specific patterns for server-side development."
    />
    <!-- @meta:
      The page description.
      I use it as a short summary of the content; it is not directly visible in the page,
      but search engines may use it as descriptive text.
    -->

    <meta
      name="keywords"
      content="backend languages, programming languages, syntax, paradigms, server-side, backend, digital odyssey"
    />
    <!-- @meta:
      The keywords meta tag lists the main themes of the page.
      Search engines no longer rank on it, but it stays a useful, self-documenting
      summary of the page's scope and a teaching example of the tag itself.
    -->

    <meta name="author" content="Iulia-Alexandra Cadar" />
    <!-- @meta:
      The author meta tag declares who created and maintains this document.
      It is a standard metadata field that identifies the creator of the work.
    -->

    <meta name="theme-color" content="#0a0b1e" />
    <!-- @theme:
      I set the browser theme color on some mobile devices.
      I choose #0a0b1e to keep the visual atmosphere consistent with the project's deep-space palette.
    -->

    <meta property="og:title" content="D::0dy55ey | Backend Languages Log" />
    <!-- @meta:
      Open Graph title.
      When the page link is shared on social networks or portfolio sites,
      this text appears as the card title instead of the raw URL.
    -->

    <meta
      property="og:description"
      content="A structured log documenting backend programming languages — syntax, paradigms, ecosystems, and language-specific patterns for server-side development."
    />
    <!-- @meta:
      Open Graph description.
      It is the companion summary shown under the Open Graph title on shared cards.
      I keep it aligned with the meta description for consistency.
    -->

    <meta property="og:type" content="website" />
    <!-- @meta:
      Open Graph type.
      I declare this page as a website, the general type for standard HTML pages.
      For journal entries, I could use "article" instead depending on the content nature.
    -->

    <meta property="og:url" content="https://iuliacadar.github.io/digital-odyssey/en/backend/backend-language-log.html" />
    <!-- @meta:
      Open Graph canonical URL.
      When the page is shared, this tells platforms the exact, permanent address of this page.
      It prevents confusion if the same content is accessible from multiple URLs.
    -->

    <meta property="og:locale" content="en_US" />
    <!-- @meta:
      Open Graph locale.
      I set it to en_US for the English version of the page.
      This tells social platforms and aggregators the language and regional variant of the content.
    -->

    <meta property="og:site_name" content="Digital Odyssey" />
    <!-- @meta:
      Open Graph site name.
      This is the overarching project name shown on social sharing cards,
      so the audience knows which site the page belongs to.
    -->

    <meta property="og:background_color" content="#0a0b1e" />
    <!-- @theme:
      Open Graph background color.
      Some sharing surfaces use it to tint the preview card with the project's deep-space palette.
    -->

    <meta property="og:image" content="../favicon.svg" />
    <!-- @path:
      Open Graph image.
      It is the preview picture used on shared cards. I point it at the favicon
      in the corresponding language folder as a stable, always-available placeholder,
      until a dedicated capture exists for each page.
    -->

    <meta name="twitter:card" content="summary_large_image" />
    <!-- @meta:
      Twitter card type.
      I choose summary_large_image so that shared links on X/Twitter display
      a large image preview alongside the title and description.
    -->

    <link rel="canonical" href="https://iuliacadar.github.io/digital-odyssey/en/backend/backend-language-log.html" />
    <!-- @meta:
      Canonical link.
      I tell search engines that this URL is the authoritative version of the page.
      This helps prevent duplicate-content issues and consolidates ranking signals.
    -->

    <meta name="robots" content="index, follow" />
    <!-- @meta:
      Robots meta tag.
      I allow search engines to index this page and follow its links,
      which is the default and expected behavior for public content.
    -->

    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <!-- @path:
      I link the page favicon.
      The path is relative to the current file location.
      The browser looks for favicon.svg in the appropriate folder.
    -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <!-- @reason:
      I start the connection to the font server early.
      The goal is to reduce latency when loading external resources.
    -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- @reason:
      I preconnect to the domain that serves the actual font files.
      crossorigin is required for external resources served from another origin.
    -->

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
    />
    <!-- @reason:
      I load the Space Grotesk font from Google Fonts.
      display=swap tells the browser to use a fallback font temporarily until the final font loads.
    -->

    <link rel="stylesheet" href="../style.css" />
    <!-- @path:
      I link the local stylesheet.
      The path is relative to the current file location.
    -->
  </head>
  <body>
    <nav class="navbar">
      <div class="logo"><a href="../index.html">Digital Odyssey</a></div>
      <ul class="nav-links">
        <li><a href="../index.html">Command Deck</a></li>
      </ul>
    </nav>

    <main class="main-container">
      <section id="log-deck">
        <header class="category-header">
      <!-- @block:
        This log page will be populated with chapter-specific content during
        the active building phase. Currently it serves as a structural shell
        with the navigation and footer systems in place.
      -->
        </header>
      </section>
    </main>

        <!-- @block: FOOTER TERMINAL — MISSION COORDINATES
      The footer serves as the vessel's telemetry deck. It marks the end of every page
      and displays the current sector orbit, spatiotemporal coordinates,
      a link to the star charts (bibliography), and the captain's signature.
    -->
    <footer class="footer">
      <!-- @structure: EXTERNAL COMMUNICATIONS LINK
        This block houses the portal to the bibliography page.
        It functions as the ship's outbound communication channel —
        a beacon that guides the crew to the reference archives.
      -->
      <div class="external-comms">
        <!-- @path:
          I link to the bibliography page. The href points to bibliography.html
          in the same language directory. For log pages in subdirectories, the
          relative path adjusts (e.g., ../bibliography.html).
        -->
        <a
          href="bibliography.html"
          target="_blank"
          class="archive-link"
        >
          <!-- @structure:
            .pulse-dot is a 6px circular element with a solar-mint green background.
            A CSS keyframe animation (dot-pulse) scales it from 1x to 2.5x and fades
            it out, simulating an active radar beacon or communication indicator.
          -->
          <span class="pulse-dot"></span>
          <!-- @reason:
            I use target="_blank" so the bibliography opens in a new browser tab.
            This lets the crew consult references without leaving the current page
            or losing their scroll position.
          -->
          Star Charts — Bibliography
        </a>
      </div>

      <!-- @structure: TELEMETRY DATA STREAM — SECTOR IDENTIFICATION
        SYS_ORBIT identifies the current chapter or module.
        It changes per page type: COMMAND_DECK for index pages,
        FRONTEND_EXPEDITION for frontend logs, BACKEND_EXPEDITION for backend, etc.
      -->
      <p>
        SYS_ORBIT: BACKEND_EXPEDITION
        // STATUS:
        <span class="telemetry-active">ONLINE</span>
        <!-- @theme:
          .telemetry-active uses solar-mint green (#a7f3d0) with a neon
          text-shadow glow, signaling an active and operational system —
          inspired by 1970s NASA terminal displays.
        -->
      </p>

      <!-- @structure: TELEMETRY DATA STREAM — SPATIOTEMPORAL COORDINATES
        Anchors the digital project in real physical space and time.
        Prevents the project from feeling like pure abstraction —
        this ship has a real-world launch site.
      -->
      <p>
        COORDINATES: 46.7712° N, 23.6236° E // SYSTEM_TIME: 2026.07.22
        <!-- @reason:
          The geographic coordinates (46.7712° N, 23.6236° E) point to
          Cluj-Napoca, Romania — the captain's location. SYSTEM_TIME records
          the date of the latest update to this footer.
        -->
      </p>

      <!-- @structure: COPYRIGHT AND VESSEL SIGNATURE
        The final line declares authorship and intellectual ownership.
        It is styled as a signature frequency — the captain's mark on every page.
      -->
      <p class="copyright">
        &copy; 2026 | Digital Odyssey by
        <span class="vessel-sig">Iulia-Alexandra Cadar</span>
        <!-- @theme:
          .vessel-sig uses nebula-pink (#ff007f) with an incandescent text-shadow
          glow. This magenta signature color is the captain's identifier across
          all decks — a neon autograph in the digital void.
        -->
      </p>
    </footer>

    <script src="../script.js"></script>
  </body>
</html>
