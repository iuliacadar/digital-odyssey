  Legenda etichetelor: ./docs/legend-ro.md
-->
<!-- @reason:
  Acest document este pagina principală în limba română a proiectului meu.
-->

<!doctype html>
<!-- @block:
  Declar tipul documentului ca HTML5.
  Browserul folosește această instrucțiune ca să interpreteze pagina în modul modern.
-->

<html lang="ro">
  <!-- @block:
    Elementul rădăcină al documentului.
    Atributul lang="ro" declară că limba principală a acestei pagini este româna.
    Asta ajută accesibilitatea, motoarele de căutare și instrumentele de procesare automată.
  -->
  <head>
    <!-- @block:
      <head> conține metadatele documentului.
      Aici nu pun conținutul principal al paginii, ci informațiile de care browserul
      are nevoie pentru a înțelege, a pregăți și a lega resursele paginii.
    -->

    <meta charset="UTF-8" />
    <!-- @meta:
      Setez codarea caracterelor la UTF-8.
      Astfel, diacriticele, simbolurile speciale și caracterele internaționale sunt afișate corect.
    -->

    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <!-- @warning:
      Această instrucțiune este istoric legată de compatibilitatea cu Internet Explorer.
      În proiectele moderne are o utilitate redusă, dar o păstrez aici dacă vreau să mențin
      structura clasică a unui head de bază.
    -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- @meta:
      Configurez viewport-ul pentru afișare responsive.
      width=device-width aliniază lățimea paginii la lățimea reală a ecranului,
      iar initial-scale=1.0 pornește fără zoom artificial.
    -->

    <title>D::0dy55ey | Cartografierea Frontierelor Digitale</title>
    <!-- @meta:
      Titlul paginii.
      Îl văd în tab-ul browserului, în bookmark-uri și uneori în rezultatele motoarelor de căutare.
    -->

    <meta
      name="description"
      content="Un jurnal bilingv de navigație liminală prin oceanele logice al codului. O explorare cosmică, temerară și terifică a arhitecturilor frontend și backend, a bazelor de date și a implementării."
    />
    <!-- @meta:
      Meta-descrierea paginii.
      O folosesc ca rezumat scurt al conținutului; nu este conținut vizibil direct în pagină,
      dar poate fi folosită de motoarele de căutare ca text descriptiv.
    -->

    <meta
      name="keywords"
      content="odisee digitală, frontend, html, css, javascript, sql, nosql, backend, json, ux, deployment, jurnal de învățare, portofoliu"
    />
    <!-- @meta:
      Meta-tagul keywords listează temele principale ale proiectului.
      Motoarele de căutare nu se mai bazează pe el pentru poziționare, dar rămâne
      un rezumat util, auto-documentat, al scopului paginii și un exemplu didactic al tagului.
    -->

    <meta name="author" content="Iulia-Alexandra Cadar" />
    <!-- @meta:
      Meta-tagul author declară cine a creat și întreține acest document.
      Este un câmp standard de metadate care îl identifică pe căpitanul navei.
    -->

    <meta name="theme-color" content="#0a0b1e" />
    <!-- @theme:
      Setez culoarea temei browserului pe unele dispozitive mobile.
      Aleg nuanța #0a0b1e pentru a continua atmosfera vizuală a proiectului meu.
    -->

    <meta property="og:title" content="D::0dy55ey | Cartografierea Frontierelor Digitale" />
    <!-- @meta:
      Titlul Open Graph.
      Când linkul paginii este distribuit pe rețele sociale sau site-uri de portofoliu,
      acest text apare ca titlu al cardului în locul URL-ului brut.
    -->

    <meta
      property="og:description"
      content="Un jurnal bilingv de navigație liminală prin oceanele logice al codului. O explorare cosmică, temerară și terifică a arhitecturilor frontend și backend, a bazelor de date și a implementării."
    />
    <!-- @meta:
      Descrierea Open Graph.
      Este rezumatul însoțitor afișat sub titlul Open Graph pe cardurile distribuite.
    -->

    <meta property="og:background_color" content="#0a0b1e" />
    <!-- @theme:
      Culoarea de fundal Open Graph.
      Unele suprafețe de distribuire o folosesc pentru a colora cardul cu paleta
      deep-space a proiectului.
    -->

    <meta property="og:image" content="./favicon.svg" />
    <!-- @path:
      Imaginea Open Graph.
      Este previzualizarea folosită pe cardurile distribuite. O îndrept spre faviconul
      local ca pe un placeholder stabil, mereu disponibil, până există o captură dedicată.
    -->

    <meta property="og:type" content="website" />
    <!-- @meta:
      Tipul Open Graph.
      Declar această pagină ca website, tipul general pentru paginile HTML standard.
      Pentru intrările de jurnal, aș putea folosi "article" — dar aici "website" se
      potrivește rolului de portofoliu și hub al acestei pagini index.
    -->

    <meta property="og:url" content="https://iuliacadar.github.io/digital-odyssey/ro/index.html" />
    <!-- @meta:
      URL-ul canonic Open Graph.
      Când pagina este distribuită, aceasta le spune platformelor adresa exactă și permanentă.
      Previnde confuzia dacă același conținut este accesibil de la mai multe URL-uri.
    -->

    <meta property="og:locale" content="ro_RO" />
    <!-- @meta:
      Localizarea Open Graph.
      Setez ro_RO pentru versiunea în limba română a paginii.
      Astfel, platformele sociale și agregatoarele știu limba și varianta regională a conținutului.
    -->

    <meta property="og:site_name" content="Digital Odyssey" />
    <!-- @meta:
      Numele site-ului Open Graph.
      Acesta este numele general al proiectului afișat pe cardurile de distribuire socială,
      astfel încât publicul să știe din ce site face parte pagina.
    -->

    <meta name="twitter:card" content="summary_large_image" />
    <!-- @meta:
      Tipul de card Twitter.
      Aleg summary_large_image pentru ca linkurile distribuite pe X/Twitter să afișeze
      o previzualizare mare a imaginii alături de titlu și descriere.
    -->

    <link rel="canonical" href="https://iuliacadar.github.io/digital-odyssey/ro/index.html" />
    <!-- @meta:
      Link canonic.
      Spun motoarelor de căutare că această URL este versiunea autoritară a paginii.
      Ajută la prevenirea problemelor de conținut duplicat și consolidează semnalele de clasare.
    -->

    <meta name="robots" content="index, follow" />
    <!-- @meta:
      Eticheta robots.
      Permit motoarelor de căutare să indexeze această pagină și să urmeze linkurile sale,
      ceea ce este comportamentul implicit și dorit pentru conținutul public.
    -->

    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <!-- @path:
      Leagă faviconul paginii.
      ./ înseamnă "folderul curent", deci browserul caută favicon.svg în același folder
      unde se află acest index.html.
    -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <!-- @reason:
      Inițiez din timp conexiunea către serverul de fonturi.
      Scopul este să reduc întârzierea la încărcarea resurselor externe.
    -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- @reason:
      Preconectez și domeniul de unde vor veni fișierele efective ale fonturilor.
      crossorigin este necesar pentru resurse externe servite de pe alt origin.
    -->

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
    />
    <!-- @reason:
      Încarc fontul Space Grotesk din Google Fonts.
      display=swap cere browserului să afișeze temporar un font de rezervă până când fontul final se încarcă.
    -->

    <link rel="stylesheet" href="./style.css" />
    <!-- @path:
      Leg foaia de stil locală a versiunii românești.
      Pentru că acest fișier index.html este în folderul ro/, browserul caută style.css tot în ro/.
    -->
  </head>
</html>
